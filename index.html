<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Unofficial Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col min-h-screen selection:bg-[#E61F2B] selection:text-white">

    <!-- Professional Navbar -->
    <nav class="w-full border-b border-zinc-900 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-[#E61F2B] rounded-full animate-pulse shadow-[0_0_8px_#E61F2B]"></div>
                <h1 class="font-bold tracking-widest text-white text-md">
                    TERMINAL <span class="text-zinc-600">|</span> <span id="user-status" class="text-xs text-cyan-400">Offline</span>
                </h1>
            </div>
            <a href="login.html" id="auth-btn" class="text-xs font-bold uppercase tracking-wider text-zinc-400 hover:text-white transition-colors">
                Login
            </a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow w-full max-w-3xl mx-auto px-4 py-8">
        
        <!-- Post Creation Box (Hidden until logged in) -->
        <div id="create-post-box" class="bg-zinc-950 border border-zinc-800 p-4 rounded-xl mb-8 glow-red hidden">
            <textarea id="post-content" placeholder="Share hardware fixes, firmware logs, or intel..." class="w-full bg-black border border-zinc-800 rounded-lg p-3 text-sm focus:border-[#E61F2B] outline-none text-white mb-3 h-24 resize-none"></textarea>
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="post-tag" placeholder="#Tag (e.g. #firmware)" class="bg-black border border-zinc-800 rounded-lg px-4 py-2 text-sm w-full sm:w-1/3 outline-none text-cyan-400 focus:border-cyan-500">
                <button id="submit-post" class="bg-[#E61F2B] hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg text-sm w-full sm:w-2/3 uppercase tracking-wider transition-all shadow-[0_0_10px_rgba(230,31,43,0.3)]">Deploy Post</button>
            </div>
        </div>

        <!-- The Feed -->
        <div id="feed-container" class="space-y-4">
            <div class="text-center text-zinc-600 text-sm py-10">Establishing connection to database...</div>
        </div>
    </main>

    <!-- Professional Developer Footer -->
    <footer class="mt-auto py-8 border-t border-zinc-900 text-center bg-black">
        <p class="text-[10px] text-zinc-600 font-mono tracking-widest leading-relaxed">
            SYSTEM ENGINEERED BY SKVZ SOFTWARES<br>
            <span class="text-zinc-800">SHIVANSH R.T • KUNJ PATIL • VENU • ZYLERN</span>
        </p>
    </footer>

    <!-- Feed Logic Engine -->
    <script type="module">
        import { db, auth } from './js/firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;

        // Verify Login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-status').innerText = user.email.split('@')[0];
                document.getElementById('auth-btn').innerText = "Dashboard";
                document.getElementById('auth-btn').href = "admin.html";
                document.getElementById('create-post-box').classList.remove('hidden');
            }
        });

        // Submit Post
        document.getElementById('submit-post').addEventListener('click', async () => {
            const content = document.getElementById('post-content').value;
            const tag = document.getElementById('post-tag').value || '#general';
            if (content.trim() === "") return;

            document.getElementById('submit-post').innerText = "Deploying...";
            await addDoc(collection(db, "posts"), {
                text: content,
                tag: tag.startsWith('#') ? tag : `#${tag}`,
                author: currentUser.email.split('@')[0],
                createdAt: serverTimestamp()
            });

            document.getElementById('post-content').value = "";
            document.getElementById('post-tag').value = "";
            document.getElementById('submit-post').innerText = "Deploy Post";
        });

        // Real-time Feed Listener
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed-container');
            feed.innerHTML = ""; 
            
            snapshot.forEach((docSnap) => {
                const post = docSnap.data();
                const postId = docSnap.id;
                
                feed.innerHTML += `
                    <div class="bg-zinc-950 border border-zinc-800 p-5 rounded-xl transition-all hover:border-zinc-700">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs font-bold text-zinc-400">@${post.author}</span>
                            <span class="text-[10px] font-black text-cyan-400 bg-cyan-900/20 border border-cyan-900/50 px-2 py-1 rounded tracking-wider uppercase">${post.tag}</span>
                        </div>
                        <p class="text-sm text-zinc-200 mb-4 leading-relaxed">${post.text}</p>
                    </div>
                `;
            });
            if (feed.innerHTML === "") feed.innerHTML = '<div class="text-center text-zinc-600 text-sm py-10">No logs found. Initialize the first transmission.</div>';
        });
    </script>
</body>
</html>
