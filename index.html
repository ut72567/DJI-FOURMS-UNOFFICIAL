<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Nexus Community | Main Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        uiBg: '#0f172a',      // slate-900
                        uiCard: '#1e293b',    // slate-800
                        uiBorder: '#334155',  // slate-700
                        uiAccent: '#3b82f6',  // blue-500
                        uiHover: '#2563eb',   // blue-600
                        uiText: '#f1f5f9',    // slate-100
                        uiMuted: '#94a3b8'    // slate-400
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="global.css">
</head>
<body class="min-h-screen flex flex-col antialiased relative overflow-x-hidden bg-uiBg text-uiText font-sans">

    <header class="sticky top-0 z-40 w-full border-b border-uiBorder bg-uiBg/95 backdrop-blur-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleDrawer(true)" class="p-2 rounded-md bg-uiCard border border-uiBorder text-uiMuted hover:text-uiText hover:border-uiMuted transition-all">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <div class="p-1.5 rounded bg-uiAccent text-white font-black tracking-wider text-xs">DJI</div>
                    <span class="font-bold text-md tracking-tight text-white">NEXUS</span>
                </div>
            </div>
            <div id="auth-zone" class="text-sm font-medium">
                <div class="h-4 w-4 animate-spin rounded-full border-2 border-uiAccent border-t-transparent"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
        <aside class="lg:col-span-1 space-y-6">
            <button onclick="handleNewThreadProtected()" class="w-full py-2.5 px-4 rounded-lg font-semibold bg-uiAccent hover:bg-uiHover text-white transition-colors flex items-center justify-center gap-2 shadow-sm">
                <i data-lucide="plus" class="w-4 h-4"></i> Create Thread
            </button>
            <div class="bg-uiCard border border-uiBorder rounded-xl p-5 shadow-sm">
                <h3 class="text-xs font-semibold tracking-wider text-uiMuted uppercase mb-4 flex items-center gap-2">
                    <i data-lucide="filter" class="w-3.5 h-3.5"></i> Categories
                </h3>
                <nav class="space-y-1.5 text-sm font-medium">
                    <button onclick="filterCategory('All')" class="w-full flex items-center justify-between p-2 rounded-md text-uiAccent bg-uiAccent/10">All Discussions</button>
                    <button onclick="filterCategory('Mavic / Air')" class="w-full text-left p-2 rounded-md text-uiMuted hover:bg-uiBorder/50 hover:text-uiText transition-colors">Mavic & Air Series</button>
                    <button onclick="filterCategory('Neo / Avata')" class="w-full text-left p-2 rounded-md text-uiMuted hover:bg-uiBorder/50 hover:text-uiText transition-colors">Neo & FPV Avata</button>
                    <button onclick="filterCategory('Firmware & Mods')" class="w-full text-left p-2 rounded-md text-uiMuted hover:bg-uiBorder/50 hover:text-uiText transition-colors">Firmware & Tweaks</button>
                </nav>
            </div>
        </aside>

        <section class="lg:col-span-3 space-y-6">
            <div id="view-feed" class="space-y-4">
                <div class="flex items-center justify-between border-b border-uiBorder pb-3">
                    <h2 id="feed-title" class="text-lg font-semibold text-white">Recent Discussions</h2>
                </div>
                <div id="threads-container" class="space-y-4"></div>
            </div>

            <div id="view-detail" class="hidden space-y-6">
                <button onclick="exitThreadDetail()" class="text-sm font-medium text-uiMuted hover:text-uiText flex items-center gap-1.5 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to feed
                </button>
                <div id="active-thread-root"></div>
                
                <div class="bg-uiCard border border-uiBorder rounded-xl p-6 space-y-5 shadow-sm">
                    <h3 class="text-sm font-semibold text-white flex items-center gap-2">
                        <i data-lucide="message-circle" class="text-uiMuted w-4 h-4"></i> Responses
                    </h3>
                    <div id="comments-container" class="space-y-4 border-l-2 border-uiBorder pl-5"></div>
                    <form id="comment-form" class="pt-4 mt-2 border-t border-uiBorder space-y-3">
                        <textarea id="comment-content" rows="3" required placeholder="Write a reply..." class="w-full bg-uiBg border border-uiBorder rounded-lg p-3 text-sm focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent text-white resize-none transition-all"></textarea>
                        <button type="submit" class="px-4 py-2 text-sm rounded-lg bg-uiBorder hover:bg-uiMuted/30 text-white font-medium transition-colors">Post Reply</button>
                    </form>
                </div>
            </div>

            <div id="view-create" class="hidden bg-uiCard border border-uiBorder rounded-xl p-6 space-y-6 shadow-sm">
                <h2 class="text-xl font-semibold text-white">Create New Discussion</h2>
                <form id="thread-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-uiMuted mb-1.5">Category</label>
                        <select id="thread-category" class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
                            <option value="Mavic / Air">Mavic / Air Series</option>
                            <option value="Neo / Avata">Neo & FPV Avata</option>
                            <option value="Firmware & Mods">Firmware & Tweaks</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-uiMuted mb-1.5">Title</label>
                        <input type="text" id="thread-title" required placeholder="What do you want to discuss?" class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-uiMuted mb-1.5">Details</label>
                        <textarea id="thread-content" rows="6" required placeholder="Provide more context..." class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent resize-none transition-all"></textarea>
                    </div>
                    
                    <div class="p-4 rounded-lg bg-uiBg/50 border border-uiBorder border-dashed">
                        <label class="block text-sm font-medium text-uiMuted mb-2">Attach Image (Optional)</label>
                        <input type="file" id="thread-image" accept="image/*" class="block w-full text-sm text-uiMuted file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-uiBorder file:text-white hover:file:bg-uiMuted/30 cursor-pointer transition-all">
                        <div id="image-upload-status" class="text-xs mt-3 hidden"></div>
                        <input type="hidden" id="uploaded-image-url">
                    </div>
                    
                    <div class="pt-2">
                        <button type="submit" id="deploy-btn" class="px-6 py-2.5 rounded-lg bg-uiAccent hover:bg-uiHover text-white font-medium text-sm transition-colors shadow-sm">Publish Post</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <div id="sidebar-drawer" class="fixed inset-0 z-50 hidden bg-uiBg/80 backdrop-blur-sm flex justify-start">
        <div class="w-80 h-full bg-uiCard border-r border-uiBorder p-6 flex flex-col justify-between shadow-2xl">
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold tracking-widest text-uiMuted uppercase">Account</span>
                    <button onclick="toggleDrawer(false)" class="text-uiMuted hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                
                <div id="drawer-user-info" class="p-4 bg-uiBg border border-uiBorder rounded-lg space-y-2">
                    <p class="text-sm text-uiMuted">Not logged in</p>
                    <button onclick="window.location.href='login.html'" class="text-sm text-uiAccent font-medium hover:underline">Sign In / Register</button>
                </div>

                <hr class="border-uiBorder">

                <div class="space-y-3">
                    <h4 class="text-xs font-semibold text-uiMuted uppercase">About</h4>
                    <div class="p-4 bg-uiBg/50 border border-uiBorder rounded-lg text-sm text-uiMuted leading-relaxed">
                        <p>DJI Nexus Community Hub.</p>
                        <p class="pt-2 mt-2 border-t border-uiBorder text-xs">Developed by XNEON Technologies</p>
                    </div>
                </div>
            </div>
            <div class="text-xs text-uiBorder font-medium">Version 2.0.26</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // ADDED: getCountFromServer is now imported for the reply counter
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, where, doc, getDoc, limit, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7-pk30LeE0TICao-rfn-LBvaWXpEr3eA",
            authDomain: "dji-community-unofficial-dd90e.firebaseapp.com",
            projectId: "dji-community-unofficial-dd90e",
            storageBucket: "dji-community-unofficial-dd90e.firebasestorage.app",
            messagingSenderId: "1361004119",
            appId: "1:1361004119:web:ec247e69da587bbd168512"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let activeCategory = 'All';
        let openThreadId = null;
        let threadUnsub = null;
        let commentUnsub = null;

        // HELPER FUNCTION: Format timestamps into readable dates
        function formatTime(timestamp) {
            if (!timestamp) return 'Just now';
            const date = timestamp.toDate();
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        const imgInput = document.getElementById('thread-image');
        const uploadStatus = document.getElementById('image-upload-status');
        const hiddenUrlInput = document.getElementById('uploaded-image-url');
        const deployBtn = document.getElementById('deploy-btn');

        imgInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            uploadStatus.classList.remove('hidden');
            uploadStatus.textContent = 'Uploading image...';
            uploadStatus.className = 'text-xs mt-3 text-uiMuted animate-pulse';
            deployBtn.disabled = true;
            deployBtn.classList.add('opacity-50', 'cursor-not-allowed');

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload?key=fe8750e79364c3b5968b64db28f8e7b6', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    hiddenUrlInput.value = data.data.url;
                    uploadStatus.textContent = '✓ Image uploaded successfully.';
                    uploadStatus.className = 'text-xs mt-3 text-green-400';
                } else {
                    throw new Error('Upload rejected by server');
                }
            } catch (err) {
                uploadStatus.textContent = 'Upload failed. Please try a different file.';
                uploadStatus.className = 'text-xs mt-3 text-red-400';
                hiddenUrlInput.value = '';
            } finally {
                deployBtn.disabled = false;
                deployBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        window.toggleDrawer = (state) => {
            const drawer = document.getElementById('sidebar-drawer');
            if (state) drawer.classList.remove('hidden');
            else drawer.classList.add('hidden');
        };

        window.handleNewThreadProtected = () => {
            if(!currentUser) window.location.href = 'login.html';
            else {
                document.getElementById('view-feed').classList.add('hidden');
                document.getElementById('view-detail').classList.add('hidden');
                document.getElementById('view-create').classList.remove('hidden');
            }
        };

        window.exitThreadDetail = () => {
            window.history.pushState({}, document.title, window.location.pathname);
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-create').classList.add('hidden');
            document.getElementById('view-feed').classList.remove('hidden');
            openThreadId = null;
        };

        window.copyThreadLink = (id) => {
            const shareUrl = `${window.location.origin}${window.location.pathname}?threadId=${id}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("Link copied to clipboard!");
            }).catch(() => {
                alert("Share link: " + shareUrl);
            });
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authZone = document.getElementById('auth-zone');
            const infoBox = document.getElementById('drawer-user-info');

            if(user) {
                authZone.innerHTML = `<button onclick="window.location.href='profile.html'" class="text-uiMuted hover:text-white transition-colors">Profile</button>`;
                infoBox.innerHTML = `
                    <div onclick="window.location.href='profile.html'" class="cursor-pointer group">
                        <p class="text-sm font-semibold text-white group-hover:text-uiAccent transition-colors">${user.displayName || 'User'}</p>
                        <p class="text-xs text-uiMuted overflow-hidden text-ellipsis">${user.email}</p>
                    </div>
                    <button id="logout-btn" class="mt-3 w-full text-center text-sm font-medium text-uiBg bg-uiMuted hover:bg-white p-2 rounded-md transition-colors">Sign Out</button>
                `;
                document.getElementById('logout-btn').onclick = () => signOut(auth);
            } else {
                authZone.innerHTML = `<button onclick="window.location.href='login.html'" class="text-uiMuted hover:text-white transition-colors">Sign In</button>`;
                infoBox.innerHTML = `
                    <p class="text-sm text-uiMuted">Not logged in</p>
                    <button onclick="window.location.href='login.html'" class="text-sm text-uiAccent font-medium hover:underline mt-1 block">Sign In / Register</button>
                `;
            }
            lucide.createIcons();
            checkDeepLinkUrl();
        });

        function checkDeepLinkUrl() {
            const params = new URLSearchParams(window.location.search);
            const threadIdParam = params.get('threadId');
            if(threadIdParam && threadIdParam !== openThreadId) {
                window.openThread(threadIdParam);
            }
        }

        window.filterCategory = (category) => {
            activeCategory = category;
            document.getElementById('feed-title').innerText = category === 'All' ? 'Recent Discussions' : `${category}`;
            syncThreads();
        };

        function syncThreads() {
            if(threadUnsub) threadUnsub();
            const ref = collection(db, "threads");
            let q = query(ref, orderBy("createdAt", "desc"), limit(30));
            if(activeCategory !== 'All') {
                q = query(ref, where("category", "==", activeCategory), orderBy("createdAt", "desc"), limit(30));
            }

            threadUnsub = onSnapshot(q, (snap) => {
                const c = document.getElementById('threads-container');
                c.innerHTML = '';
                if(snap.empty) {
                    c.innerHTML = `<div class="p-8 border border-uiBorder border-dashed text-center rounded-xl text-uiMuted text-sm">No discussions found in this category.</div>`;
                    return;
                }
                snap.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const imgThumbnail = data.imageUrl ? `<img src="${data.imageUrl}" class="mt-3 h-40 w-full object-cover rounded-lg border border-uiBorder" alt="Thumbnail">` : '';
                    const timeString = formatTime(data.createdAt);
                    
                    const d = document.createElement('div');
                    d.className = "bg-uiCard border border-uiBorder rounded-xl p-5 hover:border-uiAccent transition-colors cursor-pointer shadow-sm flex flex-col justify-between";
                    d.innerHTML = `
                        <div onclick="window.openThread('${id}')" class="space-y-2">
                            <div class="text-xs font-medium flex items-center gap-2 text-uiMuted">
                                <span class="bg-uiBorder/50 px-2 py-0.5 rounded text-uiText">${data.category}</span>
                                <span>• Posted by ${data.author}</span>
                                <span>• ${timeString}</span>
                            </div>
                            <h3 class="text-base font-semibold text-white leading-snug">${data.title}</h3>
                            <p class="text-uiMuted text-sm line-clamp-2">${data.content}</p>
                            ${imgThumbnail}
                        </div>
                        <div class="flex items-center justify-between pt-3 mt-3 border-t border-uiBorder/50">
                            <button onclick="event.stopPropagation(); window.openThread('${id}')" id="reply-count-${id}" class="text-xs font-medium text-uiAccent hover:text-uiHover flex items-center gap-1.5 transition-colors">
                                <i data-lucide="message-square" class="w-3.5 h-3.5"></i> <span class="count-text">Loading replies...</span>
                            </button>
                            
                            <button onclick="event.stopPropagation(); window.copyThreadLink('${id}')" class="text-xs font-medium text-uiMuted hover:text-white flex items-center gap-1.5 transition-colors">
                                <i data-lucide="share-2" class="w-3.5 h-3.5"></i> Share
                            </button>
                        </div>
                    `;
                    c.appendChild(d);

                    // Fetch the total reply count for this thread
                    getCountFromServer(query(collection(db, "comments"), where("threadId", "==", id))).then(countSnap => {
                        const count = countSnap.data().count;
                        const textNode = document.querySelector(`#reply-count-${id} .count-text`);
                        if (textNode) {
                            if (count === 0) {
                                textNode.textContent = "Be the first to reply";
                            } else if (count === 1) {
                                textNode.textContent = "See 1 reply";
                            } else {
                                textNode.textContent = `See all ${count} replies`;
                            }
                        }
                    }).catch(err => console.error("Error fetching count:", err));
                });
                lucide.createIcons();
            });
        }

        window.openThread = async (id) => {
            openThreadId = id;
            const targetUrl = `${window.location.origin}${window.location.pathname}?threadId=${id}`;
            window.history.pushState({ path: targetUrl }, '', targetUrl);

            document.getElementById('view-feed').classList.add('hidden');
            document.getElementById('view-create').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');

            const root = document.getElementById('active-thread-root');
            root.innerHTML = `<div class="py-8 flex justify-center"><div class="h-8 w-8 animate-spin border-2 border-uiAccent border-t-transparent rounded-full"></div></div>`;

            try {
                const docSnap = await getDoc(doc(db, "threads", id));
                if(!docSnap.exists()){
                    root.innerHTML = `<div class="p-4 bg-red-900/20 text-red-400 rounded-lg border border-red-900/30 text-sm">Error: Thread not found or has been removed.</div>`;
                    return;
                }
                const data = docSnap.data();
                const mainImage = data.imageUrl ? `<img src="${data.imageUrl}" class="w-full rounded-xl border border-uiBorder mt-5" alt="Attached Image">` : '';
                const timeString = formatTime(data.createdAt);
                
                root.innerHTML = `
                    <div class="bg-uiCard border border-uiBorder rounded-xl p-6 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-medium bg-uiBorder/50 px-2.5 py-1 rounded-md text-uiMuted">${data.category}</span>
                            <button onclick="window.copyThreadLink('${id}')" class="text-uiMuted hover:text-uiAccent transition-colors" title="Copy Link"><i data-lucide="share" class="w-4 h-4"></i></button>
                        </div>
                        <h1 class="text-xl font-bold text-white mb-3">${data.title}</h1>
                        <p class="text-uiText text-sm leading-relaxed whitespace-pre-wrap">${data.content}</p>
                        ${mainImage}
                        <div class="mt-5 pt-4 border-t border-uiBorder flex items-center justify-between gap-3">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-uiBorder flex items-center justify-center text-xs font-bold text-uiMuted">${data.author.charAt(0).toUpperCase()}</div>
                                <div class="text-sm font-medium text-uiMuted">Posted by <span class="text-white">${data.author}</span></div>
                            </div>
                            <div class="text-xs text-uiMuted">${timeString}</div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                syncComments(id);
            } catch(e) {
                root.innerHTML = `<div class="text-red-400 text-sm">Error loading thread: ${e.message}</div>`;
            }
        };

        function syncComments(threadId) {
            if(commentUnsub) commentUnsub();
            commentUnsub = onSnapshot(query(collection(db, "comments"), where("threadId", "==", threadId), orderBy("createdAt", "asc")), (snap) => {
                const c = document.getElementById('comments-container');
                c.innerHTML = '';
                if(snap.empty) {
                    c.innerHTML = `<p class="text-sm text-uiMuted italic py-2">No replies yet. Be the first to respond.</p>`;
                    return;
                }
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const timeString = formatTime(data.createdAt);
                    
                    const d = document.createElement('div');
                    d.className = "bg-uiBg border border-uiBorder p-4 rounded-lg space-y-2";
                    d.innerHTML = `
                        <div class="flex items-center justify-between mb-1">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full bg-uiBorder flex items-center justify-center text-[10px] font-bold text-uiMuted">${data.author.charAt(0).toUpperCase()}</div>
                                <span class="text-sm font-medium text-white">${data.author}</span>
                            </div>
                            <span class="text-[10px] text-uiMuted">${timeString}</span>
                        </div>
                        <p class="text-uiText text-sm pl-8">${data.content}</p>
                    `;
                    c.appendChild(d);
                });
            });
        }

        document.getElementById('comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!currentUser) { window.location.href = 'login.html'; return; }
            const input = document.getElementById('comment-content');
            const val = input.value.trim();
            if(!val) return;
            
            try {
                await addDoc(collection(db, "comments"), {
                    threadId: openThreadId,
                    content: val,
                    author: currentUser.displayName || 'User',
                    uid: currentUser.uid,
                    createdAt: new Date()
                });
                input.value = '';
                
                // NEW FEATURE: Auto-scroll to the bottom of the replies container smoothly
                setTimeout(() => {
                    const commentsContainer = document.getElementById('comments-container');
                    if (commentsContainer.lastElementChild) {
                        commentsContainer.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }
                }, 150);
                
            } catch(err) { alert(err.message); }
        });

        document.getElementById('thread-form').addEventListener('submit', async(e) => {
            e.preventDefault();
            if(!currentUser) return;
            
            const btn = document.getElementById('deploy-btn');
            btn.disabled = true;
            btn.textContent = 'Publishing...';
            
            try {
                await addDoc(collection(db, "threads"), {
                    title: document.getElementById('thread-title').value.trim(),
                    content: document.getElementById('thread-content').value.trim(),
                    category: document.getElementById('thread-category').value,
                    imageUrl: document.getElementById('uploaded-image-url').value || null,
                    author: currentUser.displayName || 'User',
                    uid: currentUser.uid,
                    createdAt: new Date()
                });
                
                e.target.reset();
                document.getElementById('uploaded-image-url').value = '';
                document.getElementById('image-upload-status').classList.add('hidden');
                
                exitThreadDetail();
                syncThreads();
            } catch(err) { 
                alert(err.message); 
            } finally {
                btn.disabled = false;
                btn.textContent = 'Publish Post';
            }
        });

        syncThreads();
    </script>
</body>
</html>
