<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | DJI Nexus Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        uiBg: '#0f172a',      // slate-900
                        uiCard: '#1e293b',    // slate-800
                        uiBorder: '#334155',  // slate-700
                        uiAccent: '#3b82f6',  // blue-500
                        uiHover: '#2563eb',   // blue-600
                        uiText: '#f1f5f9',    // slate-100
                        uiMuted: '#94a3b8'    // slate-400
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="global.css">
</head>
<body class="min-h-screen flex flex-col antialiased relative overflow-x-hidden bg-uiBg text-uiText font-sans">

    <header class="sticky top-0 z-40 w-full border-b border-uiBorder bg-uiBg/95 backdrop-blur-sm">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="p-1.5 rounded bg-uiAccent text-white font-black tracking-wider text-xs">DJI</div>
                <span class="font-bold text-md tracking-tight text-white">NEXUS</span>
            </div>
            <button onclick="window.location.href='index.html'" class="text-sm font-medium text-uiMuted hover:text-white flex items-center gap-2 transition-colors">
                <i data-lucide="home" class="w-4 h-4"></i> Return to Hub
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-2xl w-full mx-auto px-4 py-8 space-y-6">
        
        <div class="flex items-center justify-between">
            <h1 class="text-2xl font-bold text-white">Account Settings</h1>
            <button id="logout-btn" class="px-4 py-2 text-sm font-medium text-red-400 bg-red-400/10 hover:bg-red-400/20 rounded-lg transition-colors border border-red-500/20">Sign Out</button>
        </div>

        <div class="bg-uiCard border border-uiBorder rounded-xl p-6 shadow-sm space-y-8">
            
            <div class="flex items-center gap-5 pb-6 border-b border-uiBorder">
                <div id="avatar-circle" class="w-16 h-16 rounded-full bg-uiBorder flex items-center justify-center text-xl font-bold text-white shadow-inner">
                    ?
                </div>
                <div>
                    <h2 id="display-name-text" class="text-lg font-semibold text-white">Loading User...</h2>
                    <p id="display-email-text" class="text-sm text-uiMuted">Retrieving credentials</p>
                </div>
            </div>

            <form id="profile-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-uiMuted mb-1.5">Registered Email (Read-Only)</label>
                    <input type="email" id="user-email" disabled class="w-full bg-uiBg/50 border border-uiBorder rounded-lg p-2.5 text-sm text-uiMuted cursor-not-allowed">
                    <p class="text-xs text-uiMuted mt-1.5 flex items-center gap-1">
                        <i data-lucide="lock" class="w-3 h-3"></i> Email changes require administrator verification.
                    </p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-uiMuted mb-1.5">Community Display Name</label>
                    <input type="text" id="user-name" required placeholder="Enter your pilot alias..." class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
                </div>

                <div id="status-message" class="text-sm hidden pt-1 font-medium"></div>

                <div class="pt-4 border-t border-uiBorder flex justify-end">
                    <button type="submit" id="update-btn" class="px-6 py-2.5 rounded-lg bg-uiAccent hover:bg-uiHover text-white font-medium text-sm transition-colors shadow-sm flex items-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
        
        <div class="text-center text-xs text-uiMuted font-medium pt-4">
            System ID: <span id="system-uid" class="font-mono bg-uiBorder/40 px-1.5 py-0.5 rounded text-uiText">----------</span>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7-pk30LeE0TICao-rfn-LBvaWXpEr3eA",
            authDomain: "dji-community-unofficial-dd90e.firebaseapp.com",
            projectId: "dji-community-unofficial-dd90e",
            storageBucket: "dji-community-unofficial-dd90e.firebasestorage.app",
            messagingSenderId: "1361004119",
            appId: "1:1361004119:web:ec247e69da587bbd168512"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        lucide.createIcons();

        // Check authentication state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Populate Profile Data
                const displayName = user.displayName || 'Unnamed Pilot';
                
                document.getElementById('display-name-text').textContent = displayName;
                document.getElementById('display-email-text').textContent = user.email;
                document.getElementById('avatar-circle').textContent = displayName.charAt(0).toUpperCase();
                
                document.getElementById('user-email').value = user.email;
                document.getElementById('user-name').value = user.displayName || '';
                document.getElementById('system-uid').textContent = user.uid;

            } else {
                // Kick unauthorized users back to login
                window.location.href = 'login.html';
            }
        });

        // Handle Profile Updates
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newName = document.getElementById('user-name').value.trim();
            const btn = document.getElementById('update-btn');
            const statusBox = document.getElementById('status-message');

            if (!auth.currentUser) return;

            // UI Loading State
            btn.disabled = true;
            btn.innerHTML = `<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Saving...`;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            statusBox.classList.add('hidden');

            try {
                await updateProfile(auth.currentUser, {
                    displayName: newName
                });
                
                // Update UI visually
                document.getElementById('display-name-text').textContent = newName;
                document.getElementById('avatar-circle').textContent = newName.charAt(0).toUpperCase();
                
                // Show Success Message
                statusBox.textContent = '✓ Profile updated successfully.';
                statusBox.className = 'text-sm font-medium text-green-400 block pt-1';
                
            } catch (error) {
                // Show Error Message
                statusBox.textContent = `Error: ${error.message}`;
                statusBox.className = 'text-sm font-medium text-red-400 block pt-1';
            } finally {
                // Restore Button State
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> Save Changes`;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                lucide.createIcons();
            }
        });

        // Handle Sign Out
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                await signOut(auth);
                // The onAuthStateChanged listener will automatically redirect to login.html
            } catch (error) {
                alert("Failed to sign out: " + error.message);
            }
        });
    </script>
</body>
</html>
