<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Terminal Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cyberDark: '#0b0f19', cyberCard: '#151d30', cyberBorder: '#222f4c', neonCyan: '#00f0ff', neonPurple: '#bf5af2' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-cyberDark min-h-screen text-slate-200 antialiased p-4 sm:p-6">

    <div class="max-w-xl mx-auto space-y-6">
        <button onclick="window.location.href='index.html'" class="text-xs font-mono text-slate-400 hover:text-neonCyan">
            &larr; Retract To Terminal Index
        </button>

        <div class="bg-cyberCard border border-cyberBorder rounded-2xl p-6 space-y-4 shadow-xl">
            <h2 class="text-base font-bold font-mono text-white tracking-wide border-b border-cyberBorder pb-2">MUTATE INTERACTIVE PROFILE DATA</h2>
            <form id="username-form" class="space-y-3">
                <div>
                    <label class="block text-xs font-mono text-slate-400 mb-1">REGISTERED EMAIL CONTEXT (UNALTERABLE)</label>
                    <input type="text" id="prof-email" disabled class="w-full bg-cyberDark/40 border border-cyberBorder/60 rounded-lg p-2.5 text-sm text-slate-500 font-mono cursor-not-allowed">
                </div>
                <div>
                    <label class="block text-xs font-mono text-slate-400 mb-1">ALTER USERNAME ATTR HANDLE</label>
                    <input type="text" id="prof-name" required class="w-full bg-cyberDark border border-cyberBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-neonCyan">
                </div>
                <button type="submit" class="px-4 py-2 text-xs font-mono rounded bg-neonCyan text-cyberDark font-bold">COMMIT ACCOUNT NAME CHANGE</button>
            </form>
        </div>

        <div class="bg-cyberCard border border-cyberBorder rounded-2xl p-6 space-y-4 shadow-xl">
            <h2 class="text-base font-bold font-mono text-neonPurple tracking-wide border-b border-cyberBorder pb-2">RE-ENGINEER PROTECTION PASS KEY</h2>
            
            <form id="pass-request-form" class="space-y-3">
                <div>
                    <label class="block text-xs font-mono text-slate-400 mb-1">SPECIFY TARGET NEW PASS KEY</label>
                    <input type="password" id="new-pass" required minlength="6" placeholder="••••••••" class="w-full bg-cyberDark border border-cyberBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-neonPurple">
                </div>
                <button type="submit" class="px-4 py-2 text-xs font-mono rounded bg-neonPurple text-white font-bold">REQUEST PASS CHANGE CHALLENGE PACKET</button>
            </form>

            <form id="pass-verify-form" class="hidden space-y-3 pt-4 border-t border-cyberBorder">
                <div class="p-3 bg-cyberDark text-xs font-mono border border-neonCyan/20 text-neonCyan rounded">
                    Verification payload routed successfully. Check active communication inbox for verification code.
                </div>
                <div>
                    <label class="block text-xs font-mono text-slate-400 mb-1">PASS KEY VERIFICATION INTERCEPT OTP</label>
                    <input type="text" id="pass-otp" required maxlength="6" class="w-full text-center bg-cyberDark border border-neonCyan rounded-lg p-2 text-white font-mono tracking-widest text-lg">
                </div>
                <button type="submit" class="w-full py-2 text-xs font-mono rounded bg-neonCyan text-cyberDark font-bold">RE-WRITE ACCESS TOKEN PASS KEY</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7-pk30LeE0TICao-rfn-LBvaWXpEr3eA",
            authDomain: "dji-community-unofficial-dd90e.firebaseapp.com",
            projectId: "dji-community-unofficial-dd90e",
            storageBucket: "dji-community-unofficial-dd90e.firebasestorage.app",
            messagingSenderId: "1361004119",
            appId: "1:1361004119:web:ec247e69da587bbd168512"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        emailjs.init({ publicKey: "dR7szNsRur2vopJXq" });

        let activeUser = null;
        let generatedSecurityOtp = null;
        let proposedPasswordCache = "";

        onAuthStateChanged(auth, (user) => {
            if(!user) { window.location.href = 'login.html'; return; }
            activeUser = user;
            document.getElementById('prof-email').value = user.email;
            document.getElementById('prof-name').value = user.displayName || '';
        });

        // Mutate Active Handle Name Configuration Array
        document.getElementById('username-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const chosenName = document.getElementById('prof-name').value.trim();
            try {
                await updateProfile(activeUser, { displayName: chosenName });
                alert("Pilot network moniker identity updated successfully across internal platform arrays.");
            } catch(err) { alert(err.message); }
        });

        // Trigger EmailJS Authentication Token For Password Sequence
        document.getElementById('pass-request-form').addEventListener('submit', function(e) {
            e.preventDefault();
            proposedPasswordCache = document.getElementById('new-pass').value;
            
            generatedSecurityOtp = Math.floor(100000 + Math.random() * 900000).toString();
            console.log("Security Diagnostics Profile Lock Verification Match: ", generatedSecurityOtp);

            const challengeParams = {
                to_email: activeUser.email,
                user_name: activeUser.displayName || 'System Pilot',
                otp_code: generatedSecurityOtp,
                message: `A security configuration change profile challenge request was initialized. Your security confirmation key sequence is: ${generatedSecurityOtp}`
            };

            emailjs.send("service_l5yz804", "template_2zn11sn", challengeParams)
                .then(() => {
                    alert("Verification authorization loop packet transmitted.");
                    document.getElementById('pass-request-form').querySelectorAll('input, button').forEach(el => el.disabled = true);
                    document.getElementById('pass-verify-form').classList.remove('hidden');
                })
                .catch(err => alert("Verification dispatch array error: " + JSON.stringify(err)));
        });

        // Commit Password Change via Final Authorization Check
        document.getElementById('pass-verify-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const verificationValue = document.getElementById('pass-otp').value.trim();

            if(verificationValue !== generatedSecurityOtp) {
                alert("Cryptographic mismatch fault. Configuration sequence rejected.");
                return;
            }

            try {
                await updatePassword(activeUser, proposedPasswordCache);
                alert("Security credentials re-written successfully. Target sequence updated.");
                window.location.href = 'index.html';
            } catch(err) {
                alert(`Security system exception thrown: ${err.message}. (Note: If this transaction faults out, terminate session logs and re-authenticate before executing security changes).`);
            }
        });
    </script>
</body>
</html>
