<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | DJI Nexus Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        uiBg: '#0f172a',      // slate-900
                        uiCard: '#1e293b',    // slate-800
                        uiBorder: '#334155',  // slate-700
                        uiAccent: '#3b82f6',  // blue-500
                        uiHover: '#2563eb',   // blue-600
                        uiText: '#f1f5f9',    // slate-100
                        uiMuted: '#94a3b8'    // slate-400
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-uiBg text-uiText font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-uiCard border border-uiBorder p-8 rounded-xl w-full max-w-sm space-y-6 shadow-lg">
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-bold text-white tracking-tight">Welcome Back</h1>
            <p class="text-sm text-uiMuted">Sign in to access the DJI Nexus Community</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-uiMuted mb-1.5">Email Address</label>
                <input type="email" id="log-email" required placeholder="name@example.com" class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-uiMuted mb-1.5">Password</label>
                <input type="password" id="log-password" required placeholder="••••••••" class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
            </div>
            <div class="pt-2">
                <button type="submit" class="w-full py-2.5 rounded-lg bg-uiAccent hover:bg-uiHover text-white font-medium text-sm transition-colors shadow-sm">Sign In</button>
            </div>
        </form>

        <div class="text-center text-sm text-uiMuted pt-2">
            Don't have an account? <a href="signup.html" class="text-uiAccent hover:text-uiHover font-medium hover:underline transition-colors">Sign up</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7-pk30LeE0TICao-rfn-LBvaWXpEr3eA",
            authDomain: "dji-community-unofficial-dd90e.firebaseapp.com",
            projectId: "dji-community-unofficial-dd90e",
            storageBucket: "dji-community-unofficial-dd90e.firebasestorage.app",
            messagingSenderId: "1361004119",
            appId: "1:1361004119:web:ec247e69da587bbd168512"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('log-email').value.trim();
            const pass = document.getElementById('log-password').value;
            
            // Optional: Provide visual feedback during authentication
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'index.html';
            } catch(err) {
                alert("Sign In Failed: " + err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
