<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Terminal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cyberDark: '#0b0f19', cyberCard: '#151d30', cyberBorder: '#222f4c', neonCyan: '#00f0ff', neonPurple: '#bf5af2' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-cyberDark min-h-screen flex items-center justify-center p-4">

    <div class="bg-cyberCard border border-cyberBorder p-6 rounded-2xl w-full max-w-md space-y-5 shadow-2xl">
        <div class="text-center space-y-1">
            <h1 class="text-xl font-bold font-mono text-white tracking-wider">LINK AUTHENTICATION KEY</h1>
            <p class="text-xs text-slate-400 font-sans">Re-establish user database verification context bounds</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-xs font-mono text-slate-400 mb-1">PILOT EMAIL RECORD</label>
                <input type="email" id="log-email" required class="w-full bg-cyberDark border border-cyberBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-neonCyan">
            </div>
            <div>
                <label class="block text-xs font-mono text-slate-400 mb-1">PROTECTION CRYPTO PASS</label>
                <input type="password" id="log-password" required class="w-full bg-cyberDark border border-cyberBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-neonCyan">
            </div>
            <button type="submit" class="w-full py-2.5 rounded bg-neonCyan text-cyberDark font-bold font-mono text-xs tracking-wider">CONNECT PROFILE PATH</button>
        </form>

        <div class="text-center font-mono text-xs text-slate-500">
            No profile allocated? <a href="signup.html" class="text-neonPurple underline">Register Identity Sequence</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7-pk30LeE0TICao-rfn-LBvaWXpEr3eA",
            authDomain: "dji-community-unofficial-dd90e.firebaseapp.com",
            projectId: "dji-community-unofficial-dd90e",
            storageBucket: "dji-community-unofficial-dd90e.firebasestorage.app",
            messagingSenderId: "1361004119",
            appId: "1:1361004119:web:ec247e69da587bbd168512"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('log-email').value.trim();
            const pass = document.getElementById('log-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'index.html';
            } catch(err) {
                alert("Security Link Rejection: " + err.message);
            }
        });
    </script>
</body>
</html>
