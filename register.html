<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex items-center justify-center min-h-screen p-4 selection:bg-[#E61F2B] selection:text-white">

    <div class="w-full max-w-sm p-8 border border-zinc-800 bg-zinc-950 rounded-2xl glow-purple relative overflow-hidden">
        <!-- Background Accent -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-purple-600/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
        
        <div class="text-center mb-8 relative z-10">
            <div class="w-2 h-2 bg-purple-500 rounded-full animate-pulse mx-auto mb-3 shadow-[0_0_8px_#8A2BE2]"></div>
            <h2 class="text-2xl font-black text-white tracking-widest">NEW PILOT</h2>
            <p class="text-xs text-zinc-500 uppercase mt-1">Register for Access</p>
        </div>
        
        <form id="register-form" class="space-y-4 relative z-10">
            <input type="text" id="username" placeholder="Pilot Callsign (e.g. Mavic_01)" required class="w-full bg-black border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:border-purple-500 outline-none text-white transition-colors">
            <input type="email" id="email" placeholder="Email Address" required class="w-full bg-black border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:border-purple-500 outline-none text-white transition-colors">
            <input type="password" id="password" placeholder="Password (Min 6 chars)" required class="w-full bg-black border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:border-purple-500 outline-none text-white transition-colors">
            
            <button type="submit" id="reg-btn" class="w-full mt-2 bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-lg text-sm uppercase tracking-wider transition-all shadow-[0_0_15px_rgba(138,43,226,0.3)]">
                Initialize Profile
            </button>
        </form>
        <p id="error-msg" class="text-[#E61F2B] text-xs font-bold text-center mt-4 hidden"></p>
        
        <div class="mt-6 text-center relative z-10">
            <a href="login.html" class="text-xs text-zinc-500 hover:text-white transition-colors">Already registered? Log in.</a>
        </div>
    </div>

    <script type="module">
        import { registerPilot } from './js/auth.js';
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.innerText = "Encrypting...";
            
            try {
                await registerPilot(
                    document.getElementById('username').value,
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
            } catch (error) {
                document.getElementById('error-msg').innerText = error.message.replace("Firebase: ", "");
                document.getElementById('error-msg').classList.remove('hidden');
                btn.innerText = "Initialize Profile";
            }
        });
    </script>
</body>
</html>
