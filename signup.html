<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | DJI Nexus Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        uiBg: '#0f172a',      // slate-900
                        uiCard: '#1e293b',    // slate-800
                        uiBorder: '#334155',  // slate-700
                        uiAccent: '#3b82f6',  // blue-500
                        uiHover: '#2563eb',   // blue-600
                        uiText: '#f1f5f9',    // slate-100
                        uiMuted: '#94a3b8'    // slate-400
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-uiBg text-uiText font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-uiCard border border-uiBorder p-8 rounded-xl w-full max-w-md space-y-6 shadow-lg">
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-bold text-white tracking-tight">Create an Account</h1>
            <p class="text-sm text-uiMuted">Join the community. Verify your email to complete registration.</p>
        </div>

        <form id="signup-fields-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-uiMuted mb-1.5">Display Name</label>
                <input type="text" id="reg-name" required placeholder="How should we call you?" class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-uiMuted mb-1.5">Email Address</label>
                <input type="email" id="reg-email" required placeholder="name@domain.com" class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-uiMuted mb-1.5">Password</label>
                <input type="password" id="reg-password" required minlength="6" placeholder="Minimum 6 characters" class="w-full bg-uiBg border border-uiBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
            </div>
            <div class="pt-2">
                <button type="submit" class="w-full py-2.5 rounded-lg bg-uiAccent hover:bg-uiHover text-white font-medium text-sm transition-colors shadow-sm">Send Verification Code</button>
            </div>
        </form>

        <form id="signup-otp-form" class="hidden space-y-5 pt-5 border-t border-uiBorder">
            <div class="p-3 bg-uiAccent/10 border border-uiAccent/30 rounded-lg text-sm text-uiAccent font-medium text-center">
                Verification code sent. Please check your email.
            </div>
            <div>
                <label class="block text-sm font-medium text-uiMuted mb-1.5 text-center">Enter 6-Digit Code</label>
                <input type="text" id="reg-otp" required maxlength="6" placeholder="000000" class="w-full text-center tracking-[0.5em] bg-uiBg border border-uiBorder rounded-lg p-3 font-mono text-xl text-white focus:outline-none focus:border-uiAccent focus:ring-1 focus:ring-uiAccent transition-all">
            </div>
            <button type="submit" class="w-full py-2.5 rounded-lg bg-uiBorder hover:bg-uiMuted/30 text-white font-medium text-sm transition-colors shadow-sm">Verify & Create Account</button>
        </form>

        <div class="text-center text-sm text-uiMuted pt-2">
            Already have an account? <a href="login.html" class="text-uiAccent hover:text-uiHover font-medium hover:underline transition-colors">Sign in</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7-pk30LeE0TICao-rfn-LBvaWXpEr3eA",
            authDomain: "dji-community-unofficial-dd90e.firebaseapp.com",
            projectId: "dji-community-unofficial-dd90e",
            storageBucket: "dji-community-unofficial-dd90e.firebasestorage.app",
            messagingSenderId: "1361004119",
            appId: "1:1361004119:web:ec247e69da587bbd168512"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Initialize EmailJS via API configuration keys
        emailjs.init({ publicKey: "dR7szNsRur2vopJXq" });

        let generatedOtp = null;
        let registrationCache = {};

        document.getElementById('signup-fields-form').addEventListener('submit', function(e) {
            e.preventDefault();

            registrationCache.name = document.getElementById('reg-name').value.trim();
            registrationCache.email = document.getElementById('reg-email').value.trim();
            registrationCache.password = document.getElementById('reg-password').value;

            // Generate clean random 6 digit alphanumeric OTP validation code block
            generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
            console.log("System Diagnostics OTP Cache Target Link: ", generatedOtp);

            const emailParams = {
                to_email: registrationCache.email,
                user_name: registrationCache.name,
                otp_code: generatedOtp,
                message: `Your account registration verification token passcode matrix code is: ${generatedOtp}`
            };

            emailjs.send("service_l5yz804", "template_2zn11sn", emailParams)
                .then(() => {
                    alert("OTP token safely transmitted into target email stream!");
                    document.getElementById('signup-fields-form').querySelectorAll('input, button').forEach(el => el.disabled = true);
                    document.getElementById('signup-otp-form').classList.remove('hidden');
                })
                .catch((err) => {
                    alert("EmailJS pipeline transmission abort: " + JSON.stringify(err));
                });
        });

        document.getElementById('signup-otp-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const inputOtp = document.getElementById('reg-otp').value.trim();

            if(inputOtp !== generatedOtp) {
                alert("Cryptographic verification check failure. The input token structure does not match standard bounds.");
                return;
            }

            try {
                const cred = await createUserWithEmailAndPassword(auth, registrationCache.email, registrationCache.password);
                await updateProfile(cred.user, { displayName: registrationCache.name });
                alert("Account verification confirmed. Redirecting to core application array...");
                window.location.href = 'index.html';
            } catch(err) {
                alert(`Firebase core user sync failure: ${err.message}`);
            }
        });
    </script>
</body>
</html>
