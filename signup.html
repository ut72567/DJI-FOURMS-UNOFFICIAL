<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Initialization | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cyberDark: '#0b0f19', cyberCard: '#151d30', cyberBorder: '#222f4c', neonCyan: '#00f0ff', neonPurple: '#bf5af2' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-cyberDark min-h-screen flex items-center justify-center p-4">

    <div class="bg-cyberCard border border-cyberBorder p-6 rounded-2xl w-full max-w-md space-y-6 shadow-2xl">
        <div class="text-center space-y-1">
            <h1 class="text-xl font-bold font-mono tracking-tight text-white">INITIALIZE PROFILE MATRIX</h1>
            <p class="text-xs text-slate-400 font-sans">Verification protocol automated via EmailJS matrix infrastructure</p>
        </div>

        <form id="signup-fields-form" class="space-y-4">
            <div>
                <label class="block text-xs font-mono text-slate-400 mb-1">PILOT HANDLE NAME</label>
                <input type="text" id="reg-name" required placeholder="Pilot_Alpha" class="w-full bg-cyberDark border border-cyberBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-neonPurple">
            </div>
            <div>
                <label class="block text-xs font-mono text-slate-400 mb-1">SECURE COMM EMAIL LINK</label>
                <input type="email" id="reg-email" required placeholder="name@domain.com" class="w-full bg-cyberDark border border-cyberBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-neonPurple">
            </div>
            <div>
                <label class="block text-xs font-mono text-slate-400 mb-1">PROTECTION PASS KEY</label>
                <input type="password" id="reg-password" required minlength="6" class="w-full bg-cyberDark border border-cyberBorder rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-neonPurple">
            </div>
            <button type="submit" class="w-full py-2.5 rounded bg-neonPurple text-white font-bold font-mono text-xs tracking-wider">DISPATCH OTP TOKEN</button>
        </form>

        <form id="signup-otp-form" class="hidden space-y-4 pt-4 border-t border-cyberBorder">
            <div class="p-3 bg-cyberDark/80 border border-neonCyan/20 rounded-lg text-xs text-neonCyan font-mono">
                Verification challenge sent. Input the 6-digit code payload below.
            </div>
            <div>
                <label class="block text-xs font-mono text-slate-400 mb-1">INPUT 6-DIGIT ENCRYPTED OTP</label>
                <input type="text" id="reg-otp" required maxlength="6" class="w-full text-center tracking-widest bg-cyberDark border border-neonCyan rounded-lg p-2.5 font-mono text-lg text-white focus:outline-none">
            </div>
            <button type="submit" class="w-full py-2.5 rounded bg-neonCyan text-cyberDark font-bold font-mono text-xs tracking-wider">VERIFY AND SUBMIT PROFILE</button>
        </form>

        <div class="text-center font-mono text-xs text-slate-500">
            Already linked? <a href="login.html" class="text-neonCyan underline">Access Terminal Portal</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7-pk30LeE0TICao-rfn-LBvaWXpEr3eA",
            authDomain: "dji-community-unofficial-dd90e.firebaseapp.com",
            projectId: "dji-community-unofficial-dd90e",
            storageBucket: "dji-community-unofficial-dd90e.firebasestorage.app",
            messagingSenderId: "1361004119",
            appId: "1:1361004119:web:ec247e69da587bbd168512"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Initialize EmailJS via API configuration keys
        emailjs.init({ publicKey: "dR7szNsRur2vopJXq" });

        let generatedOtp = null;
        let registrationCache = {};

        document.getElementById('signup-fields-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            registrationCache.name = document.getElementById('reg-name').value.trim();
            registrationCache.email = document.getElementById('reg-email').value.trim();
            registrationCache.password = document.getElementById('reg-password').value;
            
            // Generate clean random 6 digit alphanumeric OTP validation code block
            generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
            console.log("System Diagnostics OTP Cache Target Link: ", generatedOtp);

            const emailParams = {
                to_email: registrationCache.email,
                user_name: registrationCache.name,
                otp_code: generatedOtp,
                message: `Your account registration verification token passcode matrix code is: ${generatedOtp}`
            };

            emailjs.send("service_l5yz804", "template_2zn11sn", emailParams)
                .then(() => {
                    alert("OTP token safely transmitted into target email stream!");
                    document.getElementById('signup-fields-form').querySelectorAll('input, button').forEach(el => el.disabled = true);
                    document.getElementById('signup-otp-form').classList.remove('hidden');
                })
                .catch((err) => {
                    alert("EmailJS pipeline transmission abort: " + JSON.stringify(err));
                });
        });

        document.getElementById('signup-otp-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const inputOtp = document.getElementById('reg-otp').value.trim();

            if(inputOtp !== generatedOtp) {
                alert("Cryptographic verification check failure. The input token structure does not match standard bounds.");
                return;
            }

            try {
                const cred = await createUserWithEmailAndPassword(auth, registrationCache.email, registrationCache.password);
                await updateProfile(cred.user, { displayName: registrationCache.name });
                alert("Account verification confirmed. Redirecting to core application array...");
                window.location.href = 'index.html';
            } catch(err) {
                alert(`Firebase core user sync failure: ${err.message}`);
            }
        });
    </script>
</body>
</html>
